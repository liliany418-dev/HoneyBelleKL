<div class="form-container">
  <h2>Member Registration</h2>
  <form action="#" method="post">
    <table class="contact-table">
      <tr>
        <td class="label-cell">Name <span class="required">*</span></td>
        <td class="input-cell">
          <input type="text" name="first_name" required>
          <input type="text" name="last_name" required>
        </td>
      </tr>
      
      <tr>
        <td class="label-cell">e-mail address <span class="required">*</span></td>
        <td class="input-cell">
          <input type="email" name="email" required>
        </td>
      </tr>

      <tr>
        <td class="label-cell">Address<span class="required">*</span></td>
        <td class="input-cell">
          <input type="text" name="address" required>
        </td>
      </tr>

      <tr>
        <td class="label-cell">Phone Number</td>
        <td class="input-cell">
          <input type="text" name="phonenumber">
        </td>
      </tr>

      <tr>
        <td class="label-cell">Country<span class="required">*</span></td>
        <td class="input-cell">
          <input type="text" name="country">
        </td>
      </tr>

      <tr>
        <td class="label-cell">Password <span class="required">*</span></td>
        <td class="input-cell">
          <input type="text" name="Password">
        </td>
      </tr>

      <tr>
        <td class="label-cell">Login ID <span class="required">*</span></td>
        <td class="input-cell">
          <input type="text" name="login ID">
        </td>
      </tr>

    </table>

    <div class="button-container">
      <button type="submit" class="preview-btn">REGISTER AS A NEW MEMBER</button>
    </div>
  </form>
</div>
